services:
  - type: web
    name: stack-battle-ke-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "run:app"
    envVars:
      - key: DATABASE_URL
        sync: false          # Set manually in Render dashboard (Supabase URL)
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
